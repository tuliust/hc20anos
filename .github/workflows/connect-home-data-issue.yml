          replace_between('function TicketsPreview({ navigate, content }', '\n\nfunction WhoGoingPreview', '''function TicketsPreview({ navigate, content, ticketTypes, onSelectTicket }: { navigate: (p: Page) => void; content: HomePageContent; ticketTypes: DbTicketType[]; onSelectTicket: (id: string) => void }) {
