      - name: Install dependencies
        run: npm install --no-audit --no-fund --package-lock=false

      - name: Build
        id: build
        shell: bash
        run: |
          set +e
          npm run build > /tmp/build.log 2>&1
          code=$?
          cat /tmp/build.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report build failure
        if: steps.build.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Build falhou. Trecho final do log:";
            echo '```';
            tail -n 120 /tmp/build.log;
            echo '```';
          } > /tmp/comment.md
          gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/comment.md
          gh issue close "${{ github.event.issue.number }}" --reason not-planned
          exit 1

      - name: Commit and push patched files
        if: steps.build.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git status --short | tee /tmp/status.log
          rm -f .github/workflows/connect-home-data.yml .github/workflows/connect-home-data-issue.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            gh issue comment "${{ github.event.issue.number }}" --body "Build passou, mas não houve alterações para commit."
            gh issue close "${{ github.event.issue.number }}" --reason completed
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Conecta home aos dados do evento e ingressos"
          new_sha=$(git rev-parse HEAD)
          git push origin HEAD:main
          {
            echo "Build passou e o commit foi enviado.";
            echo;
            echo "Commit: $new_sha";
            echo;
            echo "git status --short antes do commit:";
            echo '```';
            cat /tmp/status.log;
            echo '```';
          } > /tmp/comment.md
          gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/comment.md
          gh issue close "${{ github.event.issue.number }}" --reason completed
