name: Apply home curiosities adjustments

on:
  workflow_dispatch:
  push:
    branches:
      - feat/home-curiosities-content-adjustments
    paths:
      - scripts/apply-home-curiosities-content-adjustments.mjs
      - .github/workflows/apply-home-curiosities-adjustments.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/home-curiosities-content-adjustments
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply deterministic App adjustments
        run: node scripts/apply-home-curiosities-content-adjustments.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Strict CMS audit
        run: npm run audit:cms-strict

      - name: Validate diff
        run: git diff --check

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/App.tsx
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "feat: complete home curiosities content adjustments"
          git push origin HEAD:feat/home-curiosities-content-adjustments
