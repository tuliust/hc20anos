name: Run existing login crop checkout patch

on:
  push:
    paths:
      - ".github/workflows/run-existing-login-crop-checkout.yml"

permissions:
  contents: write

jobs:
  run-existing:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Extract and run existing patch script
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const workflow = fs.readFileSync('.github/workflows/apply-login-crop-checkout.yml', 'utf8');
          const marker = "node <<'NODE'";
          const startMarker = workflow.indexOf(marker);
          if (startMarker < 0) throw new Error('Patch script marker not found.');
          const scriptStart = workflow.indexOf('\n', startMarker) + 1;
          const endMarker = workflow.indexOf('\n          NODE', scriptStart);
          if (endMarker < 0) throw new Error('Patch script end marker not found.');
          const script = workflow
            .slice(scriptStart, endMarker)
            .split('\n')
            .map(line => line.replace(/^          /, ''))
            .join('\n');
          vm.runInThisContext(script, { filename: 'embedded-login-crop-checkout-patch.js' });
          NODE
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Commit final changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-login-crop-checkout.yml .github/workflows/run-existing-login-crop-checkout.yml
          git add -A src/app/App.tsx .github/workflows/apply-login-crop-checkout.yml .github/workflows/run-existing-login-crop-checkout.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Ajusta login, recorte de foto e compra autenticada"
          git push origin main
