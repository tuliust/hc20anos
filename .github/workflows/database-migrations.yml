name: Database migration safety

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - "supabase/manual/**"
      - "scripts/validate-supabase-migrations.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/database-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: database-migrations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit migration filenames and destructive SQL
        run: npm run audit:migrations

      - name: Build application
        run: npm run build
