name: Database migration safety

on:
  pull_request:
    paths:
      - "supabase/config.toml"
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - "supabase/manual/**"
      - "scripts/validate-supabase-migrations.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/database-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: database-migrations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit migration filenames and destructive SQL
        run: npm run audit:migrations

      - name: Build application
        run: npm run build

  migration-replay:
    needs: static-audit
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start local Supabase stack
        run: |
          set -o pipefail
          npx supabase start 2>&1 | tee supabase-start.log

      - name: Replay all migrations from an empty local database
        run: |
          set -o pipefail
          npx supabase db reset --local 2>&1 | tee supabase-reset.log

      - name: Show local migration history
        run: |
          set -o pipefail
          npx supabase migration list --local 2>&1 | tee supabase-migrations.log

      - name: Stop local Supabase stack
        if: always()
        run: npx supabase stop --no-backup

      - name: Upload replay diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-replay-logs
          path: |
            supabase-start.log
            supabase-reset.log
            supabase-migrations.log
          if-no-files-found: warn
          retention-days: 7
