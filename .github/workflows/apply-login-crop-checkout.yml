name: Apply login crop checkout changes

on:
  push:
    paths:
      - ".github/workflows/apply-login-crop-checkout.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Patch App.tsx
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'src/app/App.tsx';
          let text = fs.readFileSync(path, 'utf8');
          let changed = false;

          function replaceAllLiteral(from, to) {
            if (text.includes(from)) {
              text = text.split(from).join(to);
              changed = true;
            }
          }

          function replaceOnce(from, to, label) {
            if (text.includes(from)) {
              text = text.replace(from, to);
              changed = true;
              return;
            }
            console.log('Trecho não encontrado:', label || from.slice(0, 80));
          }

          replaceAllLiteral('Reivindicar meu perfil', 'Criar meu perfil');
          replaceAllLiteral('>Reivindicar perfil<', '>Criar perfil<');
          replaceAllLiteral('Reivindique seu perfil', 'Crie seu perfil');

          replaceOnce(
            'const PROTECTED_ALUMNI: Page[] = ["alumni-area", "edit-profile", "my-ticket"];',
            'const PROTECTED_ALUMNI: Page[] = ["alumni-area", "edit-profile", "my-ticket", "checkout"];',
            'PROTECTED_ALUMNI checkout'
          );

          const component = `
function AvatarCropUpload({
  currentUrl,
  fallbackLabel,
  uploading = false,
  onCroppedFile,
  onRemove,
}: {
  currentUrl?: string | null;
  fallbackLabel: string;
  uploading?: boolean;
  onCroppedFile: (file: File) => void | Promise<void>;
  onRemove?: () => void;
}) {
  const [sourceUrl, setSourceUrl] = useState<string | null>(null);
  const [fileName, setFileName] = useState("avatar.jpg");
  const [zoom, setZoom] = useState(1);
  const [offsetX, setOffsetX] = useState(0);
  const [offsetY, setOffsetY] = useState(0);
  const [processing, setProcessing] = useState(false);

  function resetAdjustments() {
    setZoom(1);
    setOffsetX(0);
    setOffsetY(0);
  }

  function clearSource() {
    if (sourceUrl) URL.revokeObjectURL(sourceUrl);
    setSourceUrl(null);
    resetAdjustments();
  }

  useEffect(() => () => {
    if (sourceUrl) URL.revokeObjectURL(sourceUrl);
  }, [sourceUrl]);

  function selectFile(file: File | null) {
    if (!file) return;
    if (sourceUrl) URL.revokeObjectURL(sourceUrl);
    setSourceUrl(URL.createObjectURL(file));
    setFileName(file.name.replace(/\\.[^.]+$/, "") || "avatar");
    resetAdjustments();
  }

  async function generateCroppedFile() {
    if (!sourceUrl) return;
    setProcessing(true);
    try {
      const image = new Image();
      image.crossOrigin = "anonymous";
      const imageLoaded = new Promise<void>((resolve, reject) => {
        image.onload = () => resolve();
        image.onerror = () => reject(new Error("Não foi possível carregar a imagem selecionada."));
      });
      image.src = sourceUrl;
      await imageLoaded;

      const outputSize = 900;
      const canvas = document.createElement("canvas");
      canvas.width = outputSize;
      canvas.height = outputSize;
      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("Não foi possível preparar o recorte.");

      ctx.fillStyle = "#0d1a0f";
      ctx.fillRect(0, 0, outputSize, outputSize);

      const coverScale = Math.max(outputSize / image.width, outputSize / image.height) * zoom;
      const drawWidth = image.width * coverScale;
      const drawHeight = image.height * coverScale;
      const maxOffsetX = Math.max(0, (drawWidth - outputSize) / 2);
      const maxOffsetY = Math.max(0, (drawHeight - outputSize) / 2);
      const dx = (outputSize - drawWidth) / 2 + (offsetX / 100) * maxOffsetX;
      const dy = (outputSize - drawHeight) / 2 + (offsetY / 100) * maxOffsetY;

      ctx.drawImage(image, dx, dy, drawWidth, drawHeight);

      const blob = await new Promise<Blob | null>(resolve => canvas.toBlob(resolve, "image/jpeg", 0.9));
      if (!blob) throw new Error("Não foi possível gerar a imagem recortada.");

      const croppedFile = new File([blob], fileName + "-recortada.jpg", { type: "image/jpeg" });
      await onCroppedFile(croppedFile);
      clearSource();
    } finally {
      setProcessing(false);
    }
  }

  const previewStyle = sourceUrl
    ? {
        backgroundImage: "url(" + sourceUrl + ")",
        backgroundSize: (zoom * 100) + "%",
        backgroundPosition: (50 + offsetX / 2) + "% " + (50 + offsetY / 2) + "%",
      }
    : undefined;

  return (
    <div className="flex flex-col gap-5">
      <div className="flex flex-col sm:flex-row gap-6">
        <div className="w-36 h-36 bg-[#2d6a4f] flex items-center justify-center text-[#f0ebe0] font-bold font-mono text-3xl shrink-0 overflow-hidden border border-[#2d6a4f]/40">
          {sourceUrl ? (
            <div className="w-full h-full bg-center bg-no-repeat" style={previewStyle} />
          ) : currentUrl ? (
            <img src={currentUrl} alt={fallbackLabel} className="w-full h-full object-cover" />
          ) : (
            fallbackLabel
          )}
        </div>

        <div className="flex-1">
          <label className="inline-flex items-center justify-center gap-2 bg-[#2d6a4f] text-[#f0ebe0] hover:bg-[#40916c] px-5 py-3 text-xs font-bold uppercase tracking-[0.15em] transition-all cursor-pointer">
            <Upload size={14} />
            Escolher imagem
            <input
              type="file"
              accept="image/jpeg,image/jpg,image/png,image/webp"
              className="sr-only"
              disabled={uploading || processing}
              onChange={e => selectFile(e.target.files?.[0] ?? null)}
            />
          </label>

          {onRemove && currentUrl && !sourceUrl && (
            <button onClick={onRemove} className="block mt-3 text-[#7a9a7a] hover:text-[#f0ebe0] text-xs font-mono">
              Remover foto ao salvar
            </button>
          )}

          <p className="text-[#7a9a7a] text-xs font-mono mt-3">
            JPG, PNG ou WebP. Depois de escolher a imagem, ajuste o zoom e a posição antes de salvar.
          </p>
        </div>
      </div>

      {sourceUrl && (
        <div className="bg-[#0a120a] border border-[#2d6a4f]/20 p-5 flex flex-col gap-4">
          <label className="block text-xs font-mono uppercase tracking-wider text-[#7a9a7a]">Zoom</label>
          <input type="range" min="1" max="3" step="0.05" value={zoom} onChange={e => setZoom(Number(e.target.value))} className="w-full" />

          <label className="block text-xs font-mono uppercase tracking-wider text-[#7a9a7a]">Mover horizontal</label>
          <input type="range" min="-100" max="100" step="1" value={offsetX} onChange={e => setOffsetX(Number(e.target.value))} className="w-full" />

          <label className="block text-xs font-mono uppercase tracking-wider text-[#7a9a7a]">Mover vertical</label>
          <input type="range" min="-100" max="100" step="1" value={offsetY} onChange={e => setOffsetY(Number(e.target.value))} className="w-full" />

          <div className="flex flex-col sm:flex-row gap-3">
            <Btn onClick={generateCroppedFile} disabled={uploading || processing}>
              {uploading || processing ? <><RefreshCw size={16} className="animate-spin" />Processando...</> : "Usar imagem recortada"}
            </Btn>
            <Btn variant="ghost" onClick={clearSource} disabled={uploading || processing}>Cancelar</Btn>
          </div>
        </div>
      )}
    </div>
  );
}
`;

          if (!text.includes('function AvatarCropUpload')) {
            replaceOnce('\nfunction EditProfilePage(', '\n' + component + '\nfunction EditProfilePage(', 'inserir AvatarCropUpload');
          }

          replaceOnce(
`              <div className="flex items-center gap-6">
                <div className="w-20 h-20 bg-[#2d6a4f] flex items-center justify-center text-[#f0ebe0] font-bold font-mono text-2xl shrink-0 overflow-hidden">
                  {form.photoUrl ? <img src={form.photoUrl} alt={form.displayName || auth.name} className="w-full h-full object-cover" /> : avatarLabel}
                </div>
                <div className="flex-1">
                  <label className="inline-flex items-center justify-center gap-2 bg-[#2d6a4f] text-[#f0ebe0] hover:bg-[#40916c] px-5 py-3 text-xs font-bold uppercase tracking-[0.15em] transition-all cursor-pointer">
                    {avatarUploading ? <RefreshCw size={14} className="animate-spin" /> : <Upload size={14} />}
                    {avatarUploading ? "Enviando..." : "Enviar foto"}
                    <input
                      type="file"
                      accept="image/jpeg,image/jpg,image/png,image/webp"
                      className="sr-only"
                      disabled={avatarUploading}
                      onChange={e => uploadAvatar(e.target.files?.[0] ?? null)}
                    />
                  </label>
                  {form.photoUrl && (
                    <button onClick={() => setForm(f => ({ ...f, photoUrl: "" }))} className="block mt-3 text-[#7a9a7a] hover:text-[#f0ebe0] text-xs font-mono">
                      Remover foto ao salvar
                    </button>
                  )}
                  <p className="text-[#7a9a7a] text-xs font-mono mt-2">JPG, PNG ou WebP ate 5 MB. A exibicao publica respeita a configuracao de privacidade abaixo.</p>
                </div>
              </div>`,
`              <AvatarCropUpload
                currentUrl={form.photoUrl}
                fallbackLabel={avatarLabel}
                uploading={avatarUploading}
                onCroppedFile={uploadAvatar}
                onRemove={() => setForm(f => ({ ...f, photoUrl: "" }))}
              />`,
            'substituir upload do editar perfil'
          );

          replaceOnce(
            '  const [claimPhone, setClaimPhone] = useState("");\n  const [claimError, setClaimError] = useState("");',
            '  const [claimPhone, setClaimPhone] = useState("");\n  const [claimAvatarFile, setClaimAvatarFile] = useState<File | null>(null);\n  const [claimAvatarUploading, setClaimAvatarUploading] = useState(false);\n  const [claimError, setClaimError] = useState("");',
            'states claim avatar'
          );

          replaceOnce(
`      await createFullProfileClaim({
        personId: selected.id,
        userId: auth.loggedIn ? auth.userId : null,
        name: selected.name,
        email: claimEmail,
        phone: claimPhone,
        answers: scoreAnswers,
      });
      setClaimResult(result);`,
`      await createFullProfileClaim({
        personId: selected.id,
        userId: auth.loggedIn ? auth.userId : null,
        name: selected.name,
        email: claimEmail,
        phone: claimPhone,
        answers: scoreAnswers,
      });

      if (auth.loggedIn && claimAvatarFile) {
        setClaimAvatarUploading(true);
        try {
          const publicUrl = await uploadProfileAvatar(auth.userId, claimAvatarFile);
          await saveMyPublicProfile(auth.userId, { current_photo_url: publicUrl }, { avatar_url: publicUrl });
        } catch {
          // O envio da foto é complementar. A criação do perfil não deve falhar por causa da imagem.
        } finally {
          setClaimAvatarUploading(false);
        }
      }

      setClaimResult(result);`,
            'upload avatar no cadastro'
          );

          replaceOnce(
`            <Field label="E-mail" type="email" placeholder="seu@email.com" value={claimEmail} onChange={setClaimEmail} icon={<Mail size={16} />} />
            <Field label="WhatsApp" type="tel" placeholder="(84) 9 9999-0000" value={claimPhone} onChange={setClaimPhone} icon={<Phone size={16} />}
              hint="Enviaremos um código de verificação via SMS ou WhatsApp" />
            <Btn full onClick={() => setStep(4)}>Enviar código de verificação <ArrowRight size={16} /></Btn>`,
`            <Field label="E-mail" type="email" placeholder="seu@email.com" value={claimEmail} onChange={setClaimEmail} icon={<Mail size={16} />} />
            <Field label="WhatsApp" type="tel" placeholder="(84) 9 9999-0000" value={claimPhone} onChange={setClaimPhone} icon={<Phone size={16} />}
              hint="Enviaremos um código de verificação via SMS ou WhatsApp" />

            <div>
              <p className="text-xs font-mono uppercase tracking-wider text-[#7a9a7a] mb-3">Foto de perfil</p>
              {auth.loggedIn ? (
                <AvatarCropUpload
                  currentUrl={null}
                  fallbackLabel={selected ? initials(selected.name) : "HC"}
                  uploading={claimAvatarUploading}
                  onCroppedFile={file => setClaimAvatarFile(file)}
                />
              ) : (
                <div className="bg-[#0a120a] border border-[#2d6a4f]/20 p-4 flex items-start gap-3">
                  <Info size={14} className="text-[#2d6a4f] shrink-0 mt-0.5" />
                  <p className="text-[#7a9a7a] text-xs">
                    A foto pode ser adicionada depois em Editar perfil, após criar a conta e fazer login.
                  </p>
                </div>
              )}
            </div>

            <Btn full onClick={() => setStep(4)}>Enviar código de verificação <ArrowRight size={16} /></Btn>`,
            'inserir avatar no step 3'
          );

          fs.writeFileSync(path, text);
          console.log(changed ? 'App.tsx atualizado.' : 'Nenhuma alteração necessária.');
          NODE
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Commit patched App.tsx
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-login-crop-checkout.yml
          git add -A src/app/App.tsx .github/workflows/apply-login-crop-checkout.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Ajusta login, recorte de foto e compra autenticada"
          git push origin main
