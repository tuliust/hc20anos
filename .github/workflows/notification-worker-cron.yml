name: Notification worker cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: notification-worker-cron
  cancel-in-progress: false

jobs:
  process-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate configuration
        env:
          SUPABASE_FUNCTIONS_URL: ${{ secrets.SUPABASE_FUNCTIONS_URL }}
          NOTIFICATION_WORKER_KEY: ${{ secrets.NOTIFICATION_WORKER_KEY }}
        run: |
          test -n "$SUPABASE_FUNCTIONS_URL" || (echo "SUPABASE_FUNCTIONS_URL is missing" && exit 1)
          test -n "$NOTIFICATION_WORKER_KEY" || (echo "NOTIFICATION_WORKER_KEY is missing" && exit 1)

      - name: Process pending notification jobs
        env:
          SUPABASE_FUNCTIONS_URL: ${{ secrets.SUPABASE_FUNCTIONS_URL }}
          NOTIFICATION_WORKER_KEY: ${{ secrets.NOTIFICATION_WORKER_KEY }}
        run: |
          response_file="$(mktemp)"
          status="$(curl --silent --show-error --output "$response_file" --write-out "%{http_code}" \
            --request POST \
            --header "Content-Type: application/json" \
            --header "x-worker-key: $NOTIFICATION_WORKER_KEY" \
            --data '{}' \
            "${SUPABASE_FUNCTIONS_URL%/}/notification-worker")"
          cat "$response_file"
          test "$status" -ge 200 -a "$status" -lt 300 || exit 1
